# FAKTA LSTM Training Configuration

# Tokenizer
max_words: 10000      # Vocabulary size (reduced to prevent overfit)
max_len: 200          # Maximum sequence length (padding)

# Embedding
embedding_dim: 64     # Word embedding dimension (reduced from 128)

# LSTM Architecture
lstm_units: 32        # Number of LSTM units (reduced from 64)
use_bidirectional: true
num_lstm_layers: 1    # Single BiLSTM layer (reduced from 2)
dropout_rate: 0.5     # Increased from 0.3

# Training
epochs: 20
batch_size: 64
learning_rate: 0.001
patience: 5           # Early stopping patience

# Data
test_split: 0.15
val_split: 0.15
random_seed: 42
